name: Publish to PyPI

# Publishes meta-adkit to PyPI when you cut a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC): no API token is stored in the repo.
#
# One-time setup on pypi.org (Account -> Publishing -> Add a pending publisher):
#   PyPI project name: meta-adkit
#   Owner / repository: jatinjain25/adkit
#   Workflow name:      publish.yml
#   Environment name:   pypi
# Then create a GitHub Release (tag e.g. v0.1.2) to trigger this workflow.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
